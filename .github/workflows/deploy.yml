name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP: multicard-mcp-go
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux binary
        run: |
          set -euo pipefail
          mkdir -p bin
          GOOS=linux GOARCH=amd64 go build -ldflags='-s -w' -o "bin/${APP}" .

      - name: Prepare bundle
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf dist/${APP}-deploy.tar.gz \
            bin \
            multicard-docs \
            deploy \
            scripts \
            README.md \
            go.mod \
            main.go \
            main_test.go

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload bundle
        run: scp dist/${APP}-deploy.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/${APP}-deploy.tar.gz"

      - name: Install on server
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail && \
            mkdir -p '${DEPLOY_PATH}' && \
            tar -xzf '/tmp/${APP}-deploy.tar.gz' -C '${DEPLOY_PATH}' && \
            cd '${DEPLOY_PATH}' && \
            chmod +x scripts/install.sh && \
            sudo INSTALL_DIR='${DEPLOY_PATH}' SUDO_CMD= bash scripts/install.sh && \
            sudo systemctl enable --now multicard-mcp.service && \
            sudo systemctl restart multicard-mcp.service && \
            (sudo systemctl --no-pager --full status multicard-mcp.service || true)"
